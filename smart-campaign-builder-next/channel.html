<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Channel Drilldown — Smart Campaign Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tag-chip { display:inline-block; background:#eef2ff; border:1px solid #c7d2fe; color:#4338ca; font-family:monospace; font-size:0.7rem; padding:2px 8px; border-radius:6px; }

    .ch-Email      { background:#dbeafe; color:#1d4ed8; }
    .ch-Meta       { background:#fce7f3; color:#9d174d; }
    .ch-Google     { background:#fef3c7; color:#92400e; }
    .ch-TikTok     { background:#f1f5f9; color:#334155; }
    .ch-LinkedIn   { background:#dbeafe; color:#1e40af; }
    .ch-TwitterX   { background:#e0f2fe; color:#0369a1; }
    .ch-YouTube    { background:#fee2e2; color:#b91c1c; }
    .ch-OrganicSEO { background:#d1fae5; color:#065f46; }
    .ch-Partners   { background:#f3e8ff; color:#6b21a8; }
    .ch-default    { background:#f1f5f9; color:#475569; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10">
  <div class="max-w-3xl mx-auto flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold text-slate-900 leading-tight">Smart Campaign Builder</p>
        <p class="text-xs text-slate-400">Prompt → smart links → clicks</p>
      </div>
    </a>
    <span id="back-link" class="text-sm font-semibold text-slate-600 hover:text-slate-900 cursor-pointer transition-colors">← Campaign</span>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 py-10 space-y-6">
  <div id="loading" class="text-center py-16 text-slate-400 text-sm">Loading channel data…</div>
  <div id="content" class="hidden space-y-6"></div>
</main>

<script>
function genDays(startIso, total, days) {
  const result = [];
  let remaining = total;
  for (let i = 0; i < days; i++) {
    const d = new Date(startIso + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + i);
    const wd = d.getUTCDay();
    const factor = (wd === 0 || wd === 6) ? 0.65 : 1.1;
    const noise = 0.75 + 0.5 * ((Math.sin(i * 1.9) + 1) / 2);
    const clicks = i === days - 1 ? Math.max(0, remaining) : Math.min(remaining, Math.round((total / days) * factor * noise));
    remaining -= clicks;
    result.push({ date: d.toISOString().slice(0, 10), clicks });
  }
  return result;
}

// channel id → channel data
const CHANNELS = {
  1: { id:1, campaign_id:1, campaign_name:"Summer Sale 2026",  name:"Email",    total_clicks:3200,
       tags:["summer-sale-2026","email"],   clicks_by_day: genDays("2026-02-15", 3200, 33),
       links:[
         { slug:"ss26-em-hero",   title:"Email Hero Banner", destination_url:"https://example.com/sale?utm_source=email&utm_medium=hero",   click_count:1820 },
         { slug:"ss26-em-cta",    title:"CTA Button",        destination_url:"https://example.com/sale?utm_source=email&utm_medium=cta",    click_count:950  },
         { slug:"ss26-em-footer", title:"Footer Link",       destination_url:"https://example.com/sale?utm_source=email&utm_medium=footer", click_count:430  },
       ]},
  2: { id:2, campaign_id:1, campaign_name:"Summer Sale 2026",  name:"Meta",     total_clicks:2800,
       tags:["summer-sale-2026","meta"],    clicks_by_day: genDays("2026-02-15", 2800, 33),
       links:[
         { slug:"ss26-meta-ig", title:"Instagram Stories", destination_url:"https://example.com/sale?utm_source=meta&utm_medium=instagram", click_count:1650 },
         { slug:"ss26-meta-fb", title:"Facebook Feed",     destination_url:"https://example.com/sale?utm_source=meta&utm_medium=facebook",  click_count:1150 },
       ]},
  3: { id:3, campaign_id:1, campaign_name:"Summer Sale 2026",  name:"Google",   total_clicks:2420,
       tags:["summer-sale-2026","google"],  clicks_by_day: genDays("2026-02-15", 2420, 33),
       links:[
         { slug:"ss26-goo-srch", title:"Search Ads",  destination_url:"https://example.com/sale?utm_source=google&utm_medium=search",  click_count:1400 },
         { slug:"ss26-goo-disp", title:"Display Ads", destination_url:"https://example.com/sale?utm_source=google&utm_medium=display", click_count:1020 },
       ]},
  4: { id:4, campaign_id:2, campaign_name:"Q1 Product Launch", name:"Email",    total_clicks:4200,
       tags:["q1-product-launch","email"],  clicks_by_day: genDays("2026-01-10", 4200, 69),
       links:[
         { slug:"q1pl-em-ann", title:"Launch Announcement", destination_url:"https://example.com/launch?utm_source=email", click_count:2600 },
         { slug:"q1pl-em-fol", title:"Follow-up Email",     destination_url:"https://example.com/launch?utm_source=email&utm_medium=followup", click_count:1600 },
       ]},
  5: { id:5, campaign_id:2, campaign_name:"Q1 Product Launch", name:"Meta",     total_clicks:3100,
       tags:["q1-product-launch","meta"],   clicks_by_day: genDays("2026-01-10", 3100, 69),
       links:[
         { slug:"q1pl-meta-reel", title:"Reels Ad", destination_url:"https://example.com/launch?utm_source=meta&utm_medium=reels", click_count:3100 },
       ]},
  6: { id:6, campaign_id:2, campaign_name:"Q1 Product Launch", name:"Google",   total_clicks:2900,
       tags:["q1-product-launch","google"], clicks_by_day: genDays("2026-01-10", 2900, 69),
       links:[
         { slug:"q1pl-goo-brand", title:"Brand Search", destination_url:"https://example.com/launch?utm_source=google&utm_medium=brand", click_count:2900 },
       ]},
  7: { id:7, campaign_id:2, campaign_name:"Q1 Product Launch", name:"Partners", total_clicks:2635,
       tags:["q1-product-launch","partners"], clicks_by_day: genDays("2026-01-10", 2635, 69),
       links:[
         { slug:"q1pl-part-blog", title:"Partner Blog", destination_url:"https://example.com/launch?utm_source=partner&utm_medium=blog", click_count:2635 },
       ]},
  8: { id:8, campaign_id:3, campaign_name:"Holiday Retargeting", name:"Email",   total_clicks:2100,
       tags:["holiday-retargeting","email"], clicks_by_day: genDays("2025-11-20", 2100, 40),
       links:[
         { slug:"hret-em-win", title:"Win-back Email", destination_url:"https://example.com/holiday?utm_source=email", click_count:2100 },
       ]},
  9: { id:9, campaign_id:3, campaign_name:"Holiday Retargeting", name:"YouTube", total_clicks:2110,
       tags:["holiday-retargeting","youtube"], clicks_by_day: genDays("2025-11-20", 2110, 40),
       links:[
         { slug:"hret-yt-pre", title:"Pre-roll Ad", destination_url:"https://example.com/holiday?utm_source=youtube", click_count:2110 },
       ]},
};

const params = new URLSearchParams(location.search);
const channelId = parseInt(params.get('id') || '1', 10);

function chClass(name) {
  const map = { 'Email':'ch-Email','Meta':'ch-Meta','Google':'ch-Google','TikTok':'ch-TikTok',
    'LinkedIn':'ch-LinkedIn','Twitter/X':'ch-TwitterX','YouTube':'ch-YouTube',
    'Organic/SEO':'ch-OrganicSEO','Partners':'ch-Partners' };
  return map[name] || 'ch-default';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildSVGChart(data) {
  if (!data || data.length === 0) {
    return `<div class="flex items-center justify-center h-24 bg-slate-50 rounded-xl border border-slate-200 text-sm text-slate-400">No clicks recorded yet</div>`;
  }
  const W = 560, H = 110, PAD_X = 6, PAD_Y = 24;
  const chartH = H - PAD_Y;
  const max = Math.max(...data.map(d => d.clicks), 1);
  const n = data.length;
  const gap = 3;
  const barW = Math.max(4, Math.floor((W - PAD_X * 2 - gap * (n - 1)) / n));
  let bars = '';
  data.forEach((d, i) => {
    const barH = Math.max(3, Math.round((chartH - 14) * d.clicks / max));
    const x = PAD_X + i * (barW + gap);
    const y = chartH - barH;
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="#6366f1" rx="2" opacity="0.85"/>`;
    const step = Math.max(1, Math.ceil(n / 6));
    if (i === 0 || i === n - 1 || i % step === 0) {
      bars += `<text x="${x + barW/2}" y="${H - 4}" text-anchor="middle" font-size="9" fill="#94a3b8">${d.date.slice(5)}</text>`;
    }
  });
  bars += `<text x="${W - 2}" y="12" text-anchor="end" font-size="9" fill="#cbd5e1">${max.toLocaleString()}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" class="w-full h-auto">${bars}</svg>`;
}

function loadChannel() {
  const ch = CHANNELS[channelId] || CHANNELS[1];
  document.title = `${ch.name} — Smart Campaign Builder`;
  document.getElementById('back-link').onclick = () => { window.location.href = `campaign.html?id=${ch.campaign_id}`; };
  document.getElementById('loading').classList.add('hidden');
  const content = document.getElementById('content');
  content.classList.remove('hidden');

  const linksHtml = ch.links.map(l => `
    <div class="flex items-center gap-3 py-2.5 border-b border-slate-100 last:border-0">
      <span class="font-mono text-sm text-slate-700">/l/${esc(l.slug)}</span>
      <span class="text-xs text-slate-400 truncate flex-1 hidden sm:block">${esc(l.destination_url)}</span>
      <span class="font-bold text-indigo-600 text-sm w-10 text-right shrink-0">${Number(l.click_count||0).toLocaleString()}</span>
    </div>
  `).join('');

  const tagsHtml = ch.tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('');

  content.innerHTML = `
    <div class="flex items-start justify-between">
      <div>
        <div class="mb-2"><span class="channel-badge ${chClass(ch.name)}">${esc(ch.name)}</span></div>
        <h1 class="text-2xl font-bold text-slate-900">${esc(ch.name)}</h1>
        <p class="text-xs text-slate-400 mt-1">Part of <a href="campaign.html?id=${ch.campaign_id}" class="text-indigo-600 hover:underline">${esc(ch.campaign_name)}</a></p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-4xl font-bold text-indigo-600">${Number(ch.total_clicks).toLocaleString()}</p>
        <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold">total clicks</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-slate-700 mb-4">Clicks Over Time</h2>
      ${buildSVGChart(ch.clicks_by_day)}
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-700">Links</h2>
        <span class="text-xs text-slate-400">${ch.links.length} link${ch.links.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="divide-y divide-slate-100">${linksHtml}</div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <h2 class="text-sm font-semibold text-slate-700 mb-3">Tags</h2>
      <div class="flex flex-wrap gap-1.5">${tagsHtml}</div>
    </div>
  `;
}

loadChannel();
</script>
</body>
</html>
