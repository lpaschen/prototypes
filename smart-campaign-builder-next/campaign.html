<script>
// ── Mock data helpers ──────────────────────────────────────────────────────────
function genDays(startIso, total, days) {
  const result = [];
  let remaining = total;
  for (let i = 0; i < days; i++) {
    const d = new Date(startIso + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + i);
    const wd = d.getUTCDay();
    const factor = (wd === 0 || wd === 6) ? 0.65 : 1.1;
    const noise = 0.75 + 0.5 * ((Math.sin(i * 1.9) + 1) / 2);
    const clicks = i === days - 1 ? Math.max(0, remaining) : Math.min(remaining, Math.round((total / days) * factor * noise));
    remaining -= clicks;
    result.push({ date: d.toISOString().slice(0, 10), clicks });
  }
  return result;
}

// ── Page logic ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const campaignId = parseInt(params.get('id') || '1', 10);
const BASE = location.origin;

function chClass(name) {
  const map = {
    'Email':'ch-Email','Meta':'ch-Meta','Google':'ch-Google','TikTok':'ch-TikTok',
    'LinkedIn':'ch-LinkedIn','Twitter/X':'ch-TwitterX','YouTube':'ch-YouTube',
    'Organic/SEO':'ch-OrganicSEO','Partners':'ch-Partners'
  };
  return map[name] || 'ch-default';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) { return new Date(s+'T00:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

async function copyText(text, btn) {
  await navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  btn.classList.add('bg-emerald-600','text-white');
  btn.classList.remove('bg-slate-100','text-slate-600','hover:bg-slate-200');
  setTimeout(() => {
    btn.textContent = orig;
    btn.classList.remove('bg-emerald-600','text-white');
    btn.classList.add('bg-slate-100','text-slate-600','hover:bg-slate-200');
  }, 1800);
}

function buildPacingChart(goal, createdAt, clicksByDay) {
  const W = 560, H = 84;
  const PL = 6, PR = 6, PT = 8, PB = 22;
  const CL = PL, CR = W - PR, CT = PT, CB = H - PB;
  const CW = CR - CL, CH = CB - CT;

  const startMs = new Date(createdAt + 'T00:00:00Z').getTime();
  const todayMs = new Date().setUTCHours(0,0,0,0);
  let endMs;
  if (goal.type === 'time_based' && goal.end_date) {
    endMs = new Date(goal.end_date + 'T00:00:00Z').getTime();
  } else {
    endMs = todayMs + 14 * 86400000;
  }
  endMs = Math.max(endMs, todayMs + 86400000);

  const dates = [];
  for (let d = startMs; d <= endMs; d += 86400000) {
    dates.push(new Date(d).toISOString().slice(0,10));
  }
  const n = dates.length;
  if (n < 2) return '';

  const clickMap = {};
  (clicksByDay || []).forEach(r => { clickMap[r.date] = r.clicks; });
  const todayStr = new Date(todayMs).toISOString().slice(0,10);

  let cumulative = 0;
  const actualPts = [];
  dates.forEach((dt, i) => {
    if (dt > todayStr) return;
    cumulative += clickMap[dt] || 0;
    const x = CL + (i / (n-1)) * CW;
    const rawY = CB - (cumulative / goal.target) * CH;
    actualPts.push(`${x.toFixed(1)},${Math.max(CT, rawY).toFixed(1)}`);
  });

  const expPts = dates.map((dt, i) => {
    const v = goal.type === 'time_based' ? goal.target * (i / (n-1)) : goal.target * i;
    const x = CL + (i / (n-1)) * CW;
    const rawY = CB - (Math.min(v, goal.target) / goal.target) * CH;
    return `${x.toFixed(1)},${Math.max(CT, rawY).toFixed(1)}`;
  }).join(' ');

  const todayIdx = dates.indexOf(todayStr);
  const todayX = todayIdx >= 0 ? CL + (todayIdx / (n-1)) * CW : null;

  return `
    <svg viewBox="0 0 ${W} ${H}" class="w-full h-auto mt-4">
      <rect x="${CL}" y="${CT}" width="${CW}" height="${CH}" fill="rgba(255,255,255,0.4)" rx="3"/>
      <line x1="${CL}" y1="${CT}" x2="${CR}" y2="${CT}" stroke="currentColor" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 2"/>
      <polyline points="${expPts}" fill="none" stroke="currentColor" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4 2"/>
      ${actualPts.length > 1 ? `<polyline points="${actualPts.join(' ')}" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
      ${actualPts.length === 1 ? `<circle cx="${actualPts[0].split(',')[0]}" cy="${actualPts[0].split(',')[1]}" r="3.5" fill="#6366f1"/>` : ''}
      ${todayX !== null ? `<line x1="${todayX.toFixed(1)}" y1="${CT}" x2="${todayX.toFixed(1)}" y2="${CB}" stroke="currentColor" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="3 2"/>` : ''}
      <text x="${CL}" y="${H - 4}" font-size="9" fill="currentColor" opacity="0.5" text-anchor="start">${dates[0].slice(5)}</text>
      ${todayX !== null ? `<text x="${todayX.toFixed(1)}" y="${H - 4}" font-size="9" fill="currentColor" opacity="0.5" text-anchor="middle">Today</text>` : ''}
      <text x="${CR}" y="${H - 4}" font-size="9" fill="currentColor" opacity="0.5" text-anchor="end">${dates[n-1].slice(5)}</text>
      <text x="${CR}" y="${CT + 11}" font-size="9" fill="currentColor" opacity="0.4" text-anchor="end">${Number(goal.target).toLocaleString()} goal</text>
    </svg>
    <div class="flex items-center gap-4 mt-2 text-xs opacity-60">
      <span class="flex items-center gap-1"><span class="inline-block w-5 border-t-2 border-indigo-500"></span> Actual</span>
      <span class="flex items-center gap-1"><span class="inline-block w-5 border-t-2 border-current border-dashed"></span> Expected pace</span>
    </div>
  `;
}

function computePacing(goal, totalClicks) {
  const start = new Date(goal.created_at + 'T00:00:00Z');
  const elapsed = Math.max(1, (Date.now() - start.getTime()) / 86400000);
  let expected;
  if (goal.type === 'time_based' && goal.end_date) {
    const end = new Date(goal.end_date + 'T00:00:00Z');
    const total = Math.max(1, (end.getTime() - start.getTime()) / 86400000);
    expected = goal.target * (elapsed / total);
  } else {
    expected = goal.target * elapsed;
  }
  const pct = expected > 0 ? totalClicks / expected : 1;
  const status = pct >= 1.05 ? 'ahead' : pct >= 0.95 ? 'on_track' : 'behind';
  return { expected: Math.round(expected), actual: totalClicks, pct, status };
}

function renderPacingBlock(goal, totalClicks, clicksByDay, createdAt) {
  const p = computePacing(goal, totalClicks);
  const cfg = {
    ahead:    { label:'Ahead',    bg:'bg-emerald-50', border:'border-emerald-200', badge:'bg-emerald-100 text-emerald-700', bar:'bg-emerald-500' },
    on_track: { label:'On Track', bg:'bg-blue-50',    border:'border-blue-200',    badge:'bg-blue-100 text-blue-700',       bar:'bg-blue-500'    },
    behind:   { label:'Behind',   bg:'bg-amber-50',   border:'border-amber-200',   badge:'bg-amber-100 text-amber-700',     bar:'bg-amber-500'   },
  }[p.status];
  const barPct = Math.min(100, Math.round(p.pct * 100));
  const diff = p.actual - p.expected;
  const diffText = diff >= 0
    ? `${diff.toLocaleString()} clicks ahead of pace`
    : `${Math.abs(diff).toLocaleString()} clicks behind pace`;
  return `
    <div class="rounded-xl border p-4 ${cfg.bg} ${cfg.border}">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-slate-700">Goal Pacing</span>
        <span class="text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wide ${cfg.badge}">${cfg.label}</span>
      </div>
      <div class="flex items-end gap-6 mb-3">
        <div><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-0.5">Actual</p><p class="text-2xl font-bold text-slate-900">${p.actual.toLocaleString()}</p></div>
        <div><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-0.5">Expected</p><p class="text-2xl font-bold text-slate-400">${p.expected.toLocaleString()}</p></div>
        <div><p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-0.5">Goal</p><p class="text-2xl font-bold text-slate-400">${Number(goal.target).toLocaleString()}</p></div>
      </div>
      <div class="w-full bg-white rounded-full h-2 overflow-hidden mb-2">
        <div class="h-2 rounded-full ${cfg.bar}" style="width:${barPct}%"></div>
      </div>
      <p class="text-xs text-slate-500">${diffText} · ${goal.type === 'time_based' ? 'time-based goal' : `daily target: ${Number(goal.target).toLocaleString()}/day`}</p>
      ${buildPacingChart(goal, createdAt, clicksByDay)}
    </div>
  `;
}

function loadCampaign() {

  const channelRows = c.channels.map(ch => `

          </div>
          <span class="text-xs text-slate-500 w-8 text-right">${ch.pct}%</span>
        </div>
      </td>
      <td class="px-4 py-3 text-right">
        <a href="channel.html?id=${ch.id}" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">View →</a>
      </td>
    </tr>
  `).join('');

  const allLinks = c.channels.flatMap(ch => ch.links.map(l => ({...l, channelName: ch.name})));
  const linksHtml = allLinks.map(l => `
    <div class="flex items-center gap-4 py-4 border-b border-slate-100 last:border-0">
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-slate-900 text-sm truncate">${esc(l.title || l.slug)}</p>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          <span class="font-mono text-sm text-indigo-600 font-medium">/l/${esc(l.slug)}</span>
          <span class="text-slate-200">•</span>
          <span class="text-xs text-slate-400 truncate max-w-xs">${esc(l.destination_url)}</span>
        </div>
      </div>
      <div class="shrink-0 text-right">
        <p class="text-sm font-bold text-slate-800">${Number(l.click_count||0).toLocaleString()}</p>
        <p class="text-xs text-slate-400">clicks</p>

  `).join('');

  content.innerHTML = `
    <div class="bg-amber-50 border border-amber-200 text-amber-700 text-xs rounded-xl px-4 py-2.5">
      Demo mode — showing sample data. Goal editing is disabled in this preview.
    </div>

    <div class="flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">${esc(c.name)}</h1>
        <p class="font-mono text-xs text-slate-400 mt-0.5">${esc(c.clean_name)} · Created ${fmtDate(c.created_at)}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-4xl font-bold text-indigo-600">${Number(c.total_clicks).toLocaleString()}</p>
        <p class="text-xs text-slate-400 uppercase tracking-wide font-semibold">total clicks</p>
      </div>
    </div>

    ${c.goal ? renderPacingBlock(c.goal, c.total_clicks, c.clicks_by_day, c.created_at) : `
      <div class="bg-slate-50 border border-slate-200 rounded-xl p-4">
        <p class="text-sm text-slate-500">No goal set for this campaign.</p>
      </div>
    `}

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="text-sm font-semibold text-slate-700">Channels</h2>
      </div>
      <table class="w-full">
        <thead><tr class="border-b border-slate-100 text-xs text-slate-400 uppercase tracking-wide font-semibold">
          <th class="px-4 py-2 text-left">Channel</th>
          <th class="px-4 py-2 text-right">Clicks</th>
          <th class="px-4 py-2 text-right">Share</th>
          <th class="px-4 py-2"></th>
        </tr></thead>
        <tbody>${channelRows}</tbody>
      </table>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-700">Links <span class="text-slate-400 font-normal">(${allLinks.length})</span></h2>
        <a href="performance.html?id=${c.id}" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">View Performance →</a>
      </div>
      <div class="divide-y divide-slate-100">${linksHtml}</div>
    </div>

}
