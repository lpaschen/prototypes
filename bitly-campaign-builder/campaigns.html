<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaigns — Bitly Campaign Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
      </svg>
      <h1 class="font-semibold text-slate-800">Bitly Campaign Builder</h1>
    </div>
    <a href="index.html" class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-1.5 text-sm font-medium transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      New Campaign
    </a>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold text-slate-800">All Campaigns</h2>
    <span class="text-sm text-slate-400">3 campaigns</span>
  </div>

  <div class="space-y-3 fade-in" id="campaign-list"></div>
</main>

<script>
const STUB_CAMPAIGNS = [
  {
    id: 1,
    name: 'Spring Sale 2026',
    description: '30% off sitewide — email, social, paid search',
    created_at: '2026-03-10T09:00:00',
    total_clicks: 4821,
    link_count: 4,
  },
  {
    id: 2,
    name: 'Product Launch — Horizon',
    description: 'New product launch across all channels',
    created_at: '2026-02-18T14:30:00',
    total_clicks: 2340,
    link_count: 3,
  },
  {
    id: 3,
    name: 'Q1 Partner Campaign',
    description: 'Affiliate and partner co-marketing push',
    created_at: '2026-01-05T10:00:00',
    total_clicks: 0,
    link_count: 2,
  },
];

function renderCampaign(c) {
  const date     = new Date(c.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const clicks   = Number(c.total_clicks).toLocaleString();
  const hasClicks = c.total_clicks > 0;

  return `
  <a href="report.html?id=${c.id}" class="block bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-200 transition-all p-5 group">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <h3 class="font-semibold text-slate-800 group-hover:text-indigo-700 transition-colors truncate">${esc(c.name)}</h3>
        ${c.description ? `<p class="text-slate-400 text-sm mt-0.5 truncate">${esc(c.description)}</p>` : ''}
        <p class="text-xs text-slate-400 mt-2">${date}</p>
      </div>
      <div class="flex-shrink-0 text-right">
        <div class="text-2xl font-bold ${hasClicks ? 'text-slate-800' : 'text-slate-300'}">${clicks}</div>
        <div class="text-xs text-slate-400">${hasClicks ? 'total clicks' : 'no data yet'}</div>
      </div>
    </div>
    <div class="mt-3 flex items-center gap-3">
      <div class="flex items-center gap-1 text-xs text-slate-400">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
        ${c.link_count} link${c.link_count !== 1 ? 's' : ''}
      </div>
      <span class="text-slate-200">·</span>
      <span class="text-xs text-indigo-500 group-hover:text-indigo-700 transition-colors">View report →</span>
    </div>
  </a>`;
}

function esc(str) {
  return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('campaign-list').innerHTML = STUB_CAMPAIGNS.map(renderCampaign).join('');
</script>
</body>
</html>
